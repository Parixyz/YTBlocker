<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 300px;
        padding: 16px;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
      }

      h1 {
        margin: 0 0 14px;
        font-size: 20px;
      }

      .card {
        background: #ffffff;
        border-radius: 10px;
        padding: 14px;
        color: #333;
      }

      .status-line {
        margin: 0 0 10px;
        font-size: 14px;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 12px;
      }

      .toggle-label {
        font-weight: bold;
      }

      .helper-text {
        margin: 12px 0 0;
        font-size: 12px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>✨ Shorts Blocker</h1>
    <div class="card">
      <p class="status-line"><strong>Status:</strong> <span id="status-value">Loading...</span></p>
      <label class="toggle-row" for="enable-toggle">
        <span class="toggle-label">Enable blocker</span>
        <input type="checkbox" id="enable-toggle" />
      </label>
      <p class="helper-text">When enabled, opening a Short shows a "Stay Concentrated" dialog.</p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
